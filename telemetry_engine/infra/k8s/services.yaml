# Track 3 application workloads: the five Go services plus the dashboard. Every
# pod scrapes on :9100 (/metrics, /healthz). Stateless consumers (processor,
# validation, scoring) can scale horizontally within their consumer group;
# leaderboard replicas each take a UNIQUE group (derived from the pod hostname)
# so every replica serves the full board over WebSocket.
# ---------------------------------------------------------------------------
# ingestion-service (telemetry intake: HTTP + WS)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: track3
  labels: { app: ingestion-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: ingestion-service } }
  template:
    metadata:
      labels: { app: ingestion-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: ingestion-service
          image: track3/ingestion-service:latest
          envFrom:
            - configMapRef: { name: track3-config }
            - secretRef: { name: track3-secrets }
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9100, name: metrics }
          readinessProbe:
            httpGet: { path: /healthz, port: 9100 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 9100 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { cpu: "1", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: track3
spec:
  selector: { app: ingestion-service }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: metrics, port: 9100, targetPort: 9100 }
---
