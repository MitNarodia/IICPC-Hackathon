# ---------------------------------------------------------------------------
# frontend (nginx serving the SPA + proxying /v1 to leaderboard-service)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: track3
  labels: { app: frontend }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: track3/frontend:latest
          ports:
            - { containerPort: 80, name: http }
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "500m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: track3
spec:
  selector: { app: frontend }
  ports:
    - { name: http, port: 80, targetPort: 80 }
