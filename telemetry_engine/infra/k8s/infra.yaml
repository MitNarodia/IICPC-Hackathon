# Stateful infrastructure for a self-contained Track 3 deployment: Redpanda
# (event bus), TimescaleDB (durable analytics store), and Redis (hot leaderboard
# state). These are single-replica dev topologies. In production you would point
# the services at managed/operator-run clusters and delete this file.
# ---------------------------------------------------------------------------
# Redpanda
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: track3
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels: { app: redpanda }
  template:
    metadata:
      labels: { app: redpanda }
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.4
          args:
            - redpanda
            - start
            - --smp=1
            - --overprovisioned
            - --node-id=0
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
            - --check=false
          ports:
            - { containerPort: 9092, name: kafka }
            - { containerPort: 9644, name: admin }
          readinessProbe:
            exec:
              command: ["sh", "-c", "rpk cluster health | grep -E 'Healthy:.+true'"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /var/lib/redpanda/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: track3
spec:
  selector: { app: redpanda }
  ports:
    - { name: kafka, port: 9092, targetPort: 9092 }
    - { name: admin, port: 9644, targetPort: 9644 }
---
# ---------------------------------------------------------------------------
# PostgreSQL + TimescaleDB
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: track3
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb:2.16.1-pg16
          env:
            - { name: POSTGRES_USER, value: track3 }
            - { name: POSTGRES_PASSWORD, value: track3 }
            - { name: POSTGRES_DB, value: track3 }
          ports:
            - { containerPort: 5432, name: pg }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "track3", "-d", "track3"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: track3
spec:
  selector: { app: postgres }
  ports:
    - { name: pg, port: 5432, targetPort: 5432 }
---
# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: track3
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - { containerPort: 6379, name: redis }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: track3
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
