# One-shot schema migration. The SQL lives in a ConfigMap created from the
# migrations directory:
#
#   kubectl -n track3 create configmap track3-migrations \
#       --from-file=backend/migrations/0001_init.up.sql
#
# The Job waits for Postgres (initContainer) then applies the migration. It is
# idempotent — every statement uses IF NOT EXISTS — so re-running is safe.
apiVersion: batch/v1
kind: Job
metadata:
  name: track3-migrate
  namespace: track3
spec:
  backoffLimit: 6
  template:
    metadata:
      labels: { app: track3-migrate }
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          env:
            - { name: PGPASSWORD, value: track3 }
          command:
            - sh
            - -c
            - "until pg_isready -h postgres -U track3 -d track3; do echo waiting; sleep 2; done"
      containers:
        - name: migrate
          image: postgres:16-alpine
          env:
            - { name: PGPASSWORD, value: track3 }
          command:
            - sh
            - -c
            - "psql -h postgres -U track3 -d track3 -v ON_ERROR_STOP=1 -f /migrations/0001_init.up.sql"
          volumeMounts:
            - { name: migrations, mountPath: /migrations, readOnly: true }
      volumes:
        - name: migrations
          configMap:
            name: track3-migrations
