apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "track3.fullname" . }}-config
  labels:
    {{- include "track3.labels" . | nindent 4 }}
data:
  KAFKA_BROKERS: {{ .Values.config.kafkaBrokers | quote }}
  KAFKA_TLS: {{ .Values.config.kafkaTLS | quote }}
  REDIS_ADDR: {{ .Values.config.redisAddr | quote }}
  METRICS_ADDR: ":9100"
  HTTP_ADDR: ":8080"
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  WINDOW_SIZE: {{ .Values.config.windowSize | quote }}
  SLIDE_INTERVAL: {{ .Values.config.slideInterval | quote }}
  ROLLING_RETENTION: {{ .Values.config.rollingRetention | quote }}
  FLUSH_INTERVAL: {{ .Values.config.flushInterval | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "track3.fullname" . }}-secrets
  labels:
    {{- include "track3.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.secrets.postgresDSN | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
