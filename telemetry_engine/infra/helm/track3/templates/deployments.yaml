{{- /* One Deployment + Service per backend service, plus the frontend. */ -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
    {{- include "track3.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        {{- include "track3.labels" $ | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.repository }}/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "track3.fullname" $ }}-config
            - secretRef:
                name: {{ include "track3.fullname" $ }}-secrets
          ports:
            - containerPort: 9100
              name: metrics
            {{- if $svc.http }}
            - containerPort: {{ $svc.httpPort | default 8080 }}
              name: http
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml ($svc.resources | default $.Values.defaultResources) | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
    {{- include "track3.labels" $ | nindent 4 }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
    {{- if $svc.http }}
    - name: http
      port: {{ $svc.httpPort | default 8080 }}
      targetPort: {{ $svc.httpPort | default 8080 }}
    {{- end }}
{{- end }}
{{- if .Values.frontend.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
    {{- include "track3.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas | default 2 }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        {{- include "track3.labels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
    {{- include "track3.labels" . | nindent 4 }}
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
{{- end }}
