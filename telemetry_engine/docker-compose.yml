# Track 3 full stack for local development and demo. One command brings up the
# event bus (Redpanda), stores (TimescaleDB + Redis), all five Go services, the
# React dashboard, and the monitoring stack (Prometheus + Grafana).
#
#   docker compose up --build
#
# Then open http://localhost:8088 for the leaderboard and http://localhost:3000
# for Grafana (admin/admin).

name: track3

x-svc-env: &svc-env
  KAFKA_BROKERS: redpanda:9092
  POSTGRES_DSN: postgres://track3:track3@postgres:5432/track3?sslmode=disable
  REDIS_ADDR: redis:6379
  METRICS_ADDR: ":9100"
  LOG_LEVEL: info

services:
  # ---- Infrastructure ----------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --check=false
    ports:
      - "29092:9092"
      - "19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_USER: track3
      POSTGRES_PASSWORD: track3
      POSTGRES_DB: track3
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U track3 -d track3"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ---- One-shot DB migration --------------------------------------------
  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: track3
    entrypoint: ["sh", "-c"]
    command:
      - "psql -h postgres -U track3 -d track3 -v ON_ERROR_STOP=1 -f /migrations/0001_init.up.sql -f /migrations/0002_sandbox_samples.up.sql"
    volumes:
      - ./backend/migrations:/migrations:ro
    restart: "no"

  # ---- Track 3 services --------------------------------------------------
  ingestion-service:
    build:
      context: ./backend
      args: { SERVICE: ingestion-service }
    environment:
      <<: *svc-env
      HTTP_ADDR: ":8080"
    ports:
      - "8081:8080"   # telemetry intake (HTTP + WS)
      - "9101:9100"   # metrics
    depends_on:
      redpanda: { condition: service_healthy }

  stream-processor:
    build:
      context: ./backend
      args: { SERVICE: stream-processor }
    environment:
      <<: *svc-env
      WINDOW_SIZE: "5s"
      SLIDE_INTERVAL: "1s"
      ROLLING_RETENTION: "120s"
      FLUSH_INTERVAL: "1s"
    ports:
      - "9102:9100"
    depends_on:
      redpanda: { condition: service_healthy }
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  validation-engine:
    build:
      context: ./backend
      args: { SERVICE: validation-engine }
    environment:
      <<: *svc-env
      FLUSH_INTERVAL: "2s"
    ports:
      - "9103:9100"
    depends_on:
      redpanda: { condition: service_healthy }
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  scoring-engine:
    build:
      context: ./backend
      args: { SERVICE: scoring-engine }
    environment:
      <<: *svc-env
      FLUSH_INTERVAL: "1s"
    ports:
      - "9104:9100"
    depends_on:
      redpanda: { condition: service_healthy }
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  leaderboard-service:
    build:
      context: ./backend
      args: { SERVICE: leaderboard-service }
    environment:
      <<: *svc-env
      HTTP_ADDR: ":8080"
    ports:
      - "8082:8080"   # REST + WebSocket
      - "9105:9100"
    depends_on:
      redpanda: { condition: service_healthy }
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  # ---- Dashboard ---------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    ports:
      - "8088:80"
    depends_on:
      - leaderboard-service

  # ---- Monitoring --------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./dashboards/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./dashboards/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
