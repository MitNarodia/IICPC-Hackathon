# nginx for the Track 3 dashboard. Serves the static SPA and proxies the API +
# WebSocket to the leaderboard-service. The `map` upgrades the connection only
# when the client requests it, so normal REST calls and WS share one location.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream leaderboard {
    server leaderboard-service:8080;
}

server {
    listen 80;
    server_name _;

    # Static SPA. Unknown paths fall back to index.html (client-side routing).
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST + WebSocket → leaderboard-service.
    location /v1/ {
        proxy_pass http://leaderboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket upgrade headers.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Live streams must not be buffered or prematurely timed out.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
