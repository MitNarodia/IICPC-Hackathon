apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-ingress-from-system-only
  namespace: track1-data
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              track: track1-system
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: build-default-deny
  namespace: track1-build
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  egress: []
