# Track 1 — Submission & Sandboxing Engine
# Full local stack: infrastructure + all services.
#
#   docker compose up --build
#
# Then POST to http://localhost:8080/submissions to test the full pipeline.

name: track1

x-svc-env: &svc-env
  DATABASE_URL: postgres://track1:track1@postgres:5432/track1?sslmode=disable
  KAFKA_BROKERS: redpanda:9092
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_BUCKET_UPLOADS: raw-uploads
  S3_BUCKET_BUILD_LOGS: build-logs
  S3_FORCE_PATH_STYLE: "true"
  S3_REGION: us-east-1

services:
  # ---- Infrastructure ----
  postgres:
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_USER: track1
      POSTGRES_PASSWORD: track1
      POSTGRES_DB: track1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U track1 -d track1"]
      interval: 5s
      timeout: 5s
      retries: 12

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "19092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---- One-shot jobs ----
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        out=$$(migrate -path=/migrations -database=postgres://track1:track1@postgres:5432/track1?sslmode=disable up 2>&1)
        ret=$$?
        echo "$$out"
        if [ $$ret -eq 0 ] || echo "$$out" | grep -q "no change"; then exit 0; fi
        exit $$ret
    volumes:
      - ./migrations:/migrations:ro
    restart: "no"

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/raw-uploads &&
      mc mb --ignore-existing local/build-logs &&
      mc anonymous set download local/raw-uploads
      "
    restart: "no"

  # ---- Track 1 Services ----
  submission-api:
    build:
      context: .
      dockerfile: services/submission-api/Dockerfile
    environment:
      <<: *svc-env
      HTTP_PORT: "8080"
      TRACK3_INGEST_URL: "http://host.docker.internal:8081"
      TRACK3_RUN_ID: "local-test"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      createbuckets: { condition: service_completed_successfully }

  upload-service:
    build:
      context: .
      dockerfile: services/upload-service/Dockerfile
    environment:
      <<: *svc-env
      HTTP_PORT: "9090"
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  build-service:
    build:
      context: .
      dockerfile: services/build-service/Dockerfile
    environment:
      <<: *svc-env
      GRPC_PORT: "9090"
      REGISTRY_URL: "http://localhost:5000"
      REGISTRY_REPO_PREFIX: "track1"
      S3_BUCKET_BUILD_LOGS: "build-logs"
      S3_BUCKET_UPLOADS: "raw-uploads"
      SANDBOX_NETWORK: "track1-sandbox-net"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  deployment-manager:
    build:
      context: .
      dockerfile: services/deployment-manager/Dockerfile
    environment:
      <<: *svc-env
      GRPC_PORT: "9090"
      SANDBOX_NETWORK: "track1-sandbox-net"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  health-monitor:
    build:
      context: .
      dockerfile: services/health-monitor/Dockerfile
    environment:
      <<: *svc-env
      HTTP_PORT: "8080"
      TRACK3_INGEST_URL: "http://host.docker.internal:8081"
      TRACK3_RUN_ID: "local-test"
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  sandbox-runner:
    build:
      context: .
      dockerfile: services/sandbox-runner/Dockerfile
    environment:
      <<: *svc-env
      SANDBOX_NETWORK: "track1-sandbox-net"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redpanda: { condition: service_healthy }

volumes:
  pgdata:
  miniodata:
